# Cloud Build configuration for EagleAgent
# Alternative to GitHub Actions for teams preferring GCP-native CI/CD
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml
#
# Or set up automatic builds:
#   gcloud builds triggers create github \
#     --repo-name=EagleAgent \
#     --repo-owner=YOUR_GITHUB_USERNAME \
#     --branch-pattern="^main$" \
#     --build-config=cloudbuild.yaml

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eagleagent:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eagleagent:latest'
      - '.'
    id: 'build-image'

  # Push Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/eagleagent:$SHORT_SHA'
    id: 'push-image-sha'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/eagleagent:latest'
    id: 'push-image-latest'
    waitFor: ['build-image']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'eagleagent'
      - '--image=gcr.io/$PROJECT_ID/eagleagent:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--execution-environment=gen2'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=300s'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--service-account=${_SERVICE_ACCOUNT}'
      - '--allow-unauthenticated'
      - '--add-volume=name=gcs-data,type=cloud-storage,bucket=${_GCS_BUCKET}'
      - '--add-volume-mount=volume=gcs-data,mount-path=/data'
      - '--set-env-vars=GOOGLE_API_KEY=${_GOOGLE_API_KEY}'
      - '--set-env-vars=CHAINLIT_AUTH_SECRET=${_CHAINLIT_AUTH_SECRET}'
      - '--set-env-vars=OAUTH_GOOGLE_CLIENT_ID=${_OAUTH_CLIENT_ID}'
      - '--set-env-vars=OAUTH_GOOGLE_CLIENT_SECRET=${_OAUTH_CLIENT_SECRET}'
      - '--set-env-vars=OAUTH_ALLOWED_DOMAINS=${_OAUTH_ALLOWED_DOMAINS}'
      - '--set-env-vars=GOOGLE_PROJECT_ID=$PROJECT_ID'
      - '--set-env-vars=GCP_BUCKET_NAME=${_GCS_BUCKET}'
      - '--set-env-vars=DATABASE_URL=sqlite+aiosqlite:////data/database/chainlit_datalayer.db'
      - '--set-env-vars=TEMP_FILES_FOLDER=/tmp/files'
      - '--set-env-vars=WORKSPACE_MCP_CREDENTIALS_DIR=/data/mcp_credentials/google_workspace'
    id: 'deploy-cloud-run'
    waitFor: ['push-image-sha', 'push-image-latest']

  # Get and update service URL
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        SERVICE_URL=$(gcloud run services describe eagleagent \
          --region=${_REGION} \
          --format='value(status.url)')
        
        echo "Service deployed to: $SERVICE_URL"
        
        gcloud run services update eagleagent \
          --region=${_REGION} \
          --update-env-vars="CHAINLIT_URL=$SERVICE_URL"
        
        echo "✅ Deployment complete: $SERVICE_URL"
    id: 'update-service-url'
    waitFor: ['deploy-cloud-run']

# Substitution variables
# Override with --substitutions flag or set in trigger
substitutions:
  _REGION: 'australia-southeast1'
  _GCS_BUCKET: 'eagleagent-data'
  _SERVICE_ACCOUNT: 'eagleagent-runner@${PROJECT_ID}.iam.gserviceaccount.com'
  # Secrets - retrieve from Secret Manager
  _GOOGLE_API_KEY: '${_SECRET_GOOGLE_API_KEY}'
  _CHAINLIT_AUTH_SECRET: '${_SECRET_CHAINLIT_AUTH_SECRET}'
  _OAUTH_CLIENT_ID: '${_SECRET_OAUTH_CLIENT_ID}'
  _OAUTH_CLIENT_SECRET: '${_SECRET_OAUTH_CLIENT_SECRET}'
  _OAUTH_ALLOWED_DOMAINS: 'yourdomain.com'

# Use Secret Manager for sensitive values
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_API_KEY/versions/latest
      env: '_SECRET_GOOGLE_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/CHAINLIT_AUTH_SECRET/versions/latest
      env: '_SECRET_CHAINLIT_AUTH_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/OAUTH_GOOGLE_CLIENT_ID/versions/latest
      env: '_SECRET_OAUTH_CLIENT_ID'
    - versionName: projects/$PROJECT_ID/secrets/OAUTH_GOOGLE_CLIENT_SECRET/versions/latest
      env: '_SECRET_OAUTH_CLIENT_SECRET'

# Build options
options:
  # Use higher machine type for faster builds
  machineType: 'N1_HIGHCPU_8'
  # Enable logging
  logging: CLOUD_LOGGING_ONLY

# Images to push to Container Registry
images:
  - 'gcr.io/$PROJECT_ID/eagleagent:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/eagleagent:latest'

# Build timeout (top-level)
timeout: '1200s'


