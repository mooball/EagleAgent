name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: australia-southeast1
  SERVICE_NAME: eagleagent
  GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
  OAUTH_ALLOWED_DOMAINS: mooball.net,eagle-exports.com

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
      
      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
                     ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:latest
      
      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:latest
      
      - name: Deploy to Cloud Run
        run: |
          # Create env vars file to handle commas in values
          cat > env-vars.yaml <<EOF
          GOOGLE_API_KEY: "${{ secrets.GOOGLE_API_KEY }}"
          CHAINLIT_AUTH_SECRET: "${{ secrets.CHAINLIT_AUTH_SECRET }}"
          OAUTH_GOOGLE_CLIENT_ID: "${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}"
          OAUTH_GOOGLE_CLIENT_SECRET: "${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}"
          OAUTH_ALLOWED_DOMAINS: "${{ env.OAUTH_ALLOWED_DOMAINS }}"
          GOOGLE_PROJECT_ID: "${{ env.PROJECT_ID }}"
          GCP_BUCKET_NAME: "${{ env.GCS_BUCKET_NAME }}"
          DATABASE_URL: "sqlite+aiosqlite:////data/database/chainlit_datalayer.db"
          TEMP_FILES_FOLDER: "/tmp/files"
          WORKSPACE_MCP_CREDENTIALS_DIR: "/data/mcp_credentials/google_workspace"
          EOF
          
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --execution-environment gen2 \
            --memory 2Gi \
            --cpu 2 \
            --timeout 300s \
            --min-instances 0 \
            --max-instances 10 \
            --service-account ${{ secrets.GCP_SERVICE_ACCOUNT }} \
            --allow-unauthenticated \
            --add-volume name=gcs-data,type=cloud-storage,bucket=${{ env.GCS_BUCKET_NAME }} \
            --add-volume-mount volume=gcs-data,mount-path=/data \
            --env-vars-file env-vars.yaml
      
      - name: Get Service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "🚀 Service deployed to: $SERVICE_URL"
          echo ""
          echo "⚠️  MANUAL STEP REQUIRED (first deployment only):"
          echo "Set CHAINLIT_URL environment variable to: $SERVICE_URL"
          echo ""
          echo "Run this command:"
          echo "gcloud run services update ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --update-env-vars \"CHAINLIT_URL=$SERVICE_URL\""
